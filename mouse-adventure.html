<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mouse Adventure 🐭</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sky: #a8edff; --grass: #5dd96b; --sun: #ffd93d;
  --pink: #ff6eb4; --purple: #b388ff; --orange: #ff9a3c;
  --red: #ff5252; --white: #fff; --dark: #2d2d2d;
}
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(180deg, #a8edff 0%, #c8f5c0 70%, #5dd96b 100%);
  min-height: 100vh; overflow: hidden;
  user-select: none; cursor: none;
}
/* Custom cursor */
#cursor {
  position: fixed; width: 36px; height: 36px;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
  font-size: 28px; transition: transform 0.05s;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,.3));
}
#cursor.clicking { transform: translate(-50%,-50%) scale(.75); }
/* Clouds */
.cloud { position: absolute; background: white; border-radius: 50px; opacity: .85; animation: drift linear infinite; }
.cloud::before,.cloud::after { content:''; position:absolute; background:white; border-radius:50%; }
@keyframes drift { from{transform:translateX(-200px)} to{transform:translateX(110vw)} }
#c1{width:120px;height:40px;top:8%;left:5%;animation-duration:18s}
#c1::before{width:60px;height:60px;top:-30px;left:15px}
#c1::after{width:45px;height:45px;top:-20px;left:50px}
#c2{width:90px;height:30px;top:15%;right:10%;animation-duration:24s;animation-direction:reverse}
#c2::before{width:45px;height:45px;top:-22px;left:10px}
#c2::after{width:35px;height:35px;top:-16px;left:38px}
#c3{width:100px;height:35px;top:5%;left:45%;animation-duration:20s}
#c3::before{width:50px;height:50px;top:-25px;left:15px}
#c3::after{width:38px;height:38px;top:-18px;left:45px}
/* Sun */
#sun {
  position:absolute; top:20px; right:60px; width:80px; height:80px;
  background:radial-gradient(circle,#FFE066 40%,#FFD700 100%);
  border-radius:50%; box-shadow:0 0 40px rgba(255,215,0,.6);
  animation:spin 30s linear infinite;
}
#sun::before {
  content:''; position:absolute; inset:-20px;
  background:repeating-conic-gradient(rgba(255,215,0,.4) 0deg 20deg,transparent 20deg 40deg);
  border-radius:50%;
}
@keyframes spin{to{transform:rotate(360deg)}}
/* HUD */
#hud {
  position:absolute; top:16px; left:16px; z-index:100;
  background:rgba(255,255,255,.9); border-radius:20px; padding:10px 18px;
  font-family:'Fredoka One',sans-serif; font-size:1.1rem; color:#2D1B69;
  box-shadow:0 4px 16px rgba(0,0,0,.1); pointer-events:none;
}
/* Back home button */
.home-btn {
  position:fixed; bottom:20px; left:20px; z-index:1000;
  background:rgba(255,255,255,.85); backdrop-filter:blur(8px);
  border:2px solid rgba(0,0,0,.1); border-radius:50px;
  padding:10px 22px; font-family:'Nunito',sans-serif;
  font-size:1rem; font-weight:800; color:#2D1B69;
  cursor:pointer; text-decoration:none;
  box-shadow:0 4px 16px rgba(0,0,0,.15);
  transition:all .2s;
}
.home-btn:hover { transform:scale(1.05); background:white; }
/* Level title */
#level-title {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  text-align:center; z-index:200; font-family:'Fredoka One',sans-serif;
  pointer-events:none;
}
#level-title h2 { font-size:clamp(2rem,5vw,4rem); color:white; text-shadow:0 3px 12px rgba(0,0,0,.4); margin-bottom:8px; }
#level-title p { font-size:clamp(1rem,2.5vw,1.6rem); color:rgba(255,255,255,.9); background:rgba(0,0,0,.2); padding:8px 20px; border-radius:20px; }
/* Instruction banner */
#banner {
  position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
  background:rgba(255,255,255,.95); border-radius:20px; padding:12px 28px;
  font-family:'Fredoka One',sans-serif; font-size:clamp(1rem,3vw,1.4rem);
  color:#2D1B69; box-shadow:0 6px 24px rgba(0,0,0,.15); z-index:100;
  text-align:center; max-width:90vw; pointer-events:none;
}
/* Targets */
.move-target {
  position:absolute; border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.9) 30%,rgba(255,213,0,.8) 100%);
  box-shadow:0 0 30px rgba(255,213,0,.8);
  pointer-events:none; animation:pulse 1.2s ease-in-out infinite;
  display:flex; align-items:center; justify-content:center; font-size:1.8rem;
}
.click-target {
  position:absolute; border-radius:50%; cursor:none;
  box-shadow:0 6px 20px rgba(0,0,0,.2);
  display:flex; align-items:center; justify-content:center; font-size:2rem;
  transition:transform .1s;
}
.dbl-box {
  position:absolute; border-radius:20px; cursor:none;
  box-shadow:0 8px 24px rgba(0,0,0,.2);
  display:flex; align-items:center; justify-content:center; font-size:3rem;
  animation:bounce 1.5s ease-in-out infinite;
}
.drag-source {
  position:absolute; border-radius:50%; cursor:none;
  display:flex; align-items:center; justify-content:center; font-size:2.5rem;
  box-shadow:0 4px 16px rgba(0,0,0,.15); animation:pulse 2s ease-in-out infinite;
}
.drag-zone {
  position:absolute; border-radius:50%;
  border:4px dashed rgba(255,255,255,.7);
  display:flex; align-items:center; justify-content:center;
  font-size:1.4rem; color:rgba(255,255,255,.8); font-family:'Fredoka One',sans-serif;
}
.drag-zone.lit { border-color:#FFD700; box-shadow:0 0 20px rgba(255,213,0,.5); }
.basket {
  position:absolute; border-radius:20px;
  background:rgba(255,255,255,.15);
  border:4px dashed rgba(255,255,255,.6);
  display:flex; align-items:center; justify-content:center;
  font-size:2rem; flex-direction:column; gap:4px;
  font-family:'Fredoka One',sans-serif; color:rgba(255,255,255,.9);
}
.basket.lit { border-color:#FFD700; background:rgba(255,213,0,.25); }
.basket .basket-label { font-size:1rem; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
/* Sparkle */
.sparkle {
  position:fixed; pointer-events:none; z-index:9998; font-size:1.8rem;
  animation:sparkle-out .9s ease-out forwards;
}
@keyframes sparkle-out {
  0%{transform:translate(-50%,-50%) scale(.5);opacity:1}
  100%{transform:translate(-50%,-50%) translateY(-60px) scale(1.5);opacity:0}
}
/* Level up overlay */
#lvlup {
  position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,.6); display:none;
  align-items:center; justify-content:center;
}
#lvlup.show{display:flex}
.lvlup-card {
  background:linear-gradient(135deg,#FFE066,#FFA552);
  border-radius:32px; padding:40px; text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
  animation:pop .4s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.lvlup-card h2 { font-family:'Fredoka One',sans-serif; font-size:2.5rem; color:white; text-shadow:0 2px 8px rgba(0,0,0,.2); margin-bottom:12px; }
.lvlup-card p { font-size:1.2rem; font-weight:700; color:rgba(255,255,255,.9); margin-bottom:24px; }
.lvlup-btn {
  background:white; color:#FF6B6B; border:none; border-radius:50px;
  padding:14px 40px; font-family:'Fredoka One',sans-serif; font-size:1.3rem;
  cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,.15); transition:transform .2s;
}
.lvlup-btn:hover{transform:scale(1.05)}
/* Win screen */
#win {
  position:fixed; inset:0; z-index:600;
  background:linear-gradient(135deg,#C77DFF,#54A0FF);
  display:none; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:30px;
}
#win.show{display:flex}
#win h1{font-family:'Fredoka One',sans-serif;font-size:clamp(2rem,6vw,4rem);color:white;text-shadow:0 4px 16px rgba(0,0,0,.3);margin-bottom:16px}
#win p{font-size:1.3rem;font-weight:700;color:rgba(255,255,255,.9);margin-bottom:30px}
/* Confetti */
.confetti-piece {
  position:fixed; width:12px; height:12px;
  pointer-events:none; z-index:9999; top:0;
  animation:fall ease-in forwards;
}
@keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<div id="cursor">🐭</div>
<div class="cloud" id="c1"></div>
<div class="cloud" id="c2"></div>
<div class="cloud" id="c3"></div>
<div id="sun"></div>
<div id="hud">⭐ Score: <span id="score">0</span></div>
<div id="level-title"><h2 id="lt-name"></h2><p id="lt-instr"></p></div>
<div id="banner"></div>
<div id="lvlup"><div class="lvlup-card"><h2 id="lu-title">🌟 Level Up!</h2><p id="lu-desc"></p><button class="lvlup-btn" id="lu-btn">Let's Go! 🚀</button></div></div>
<div id="win">
  <h1>🏆 You're Amazing! 🏆</h1>
  <p>You finished all the levels!</p>
  <a href="index.html" style="background:white;color:#C77DFF;border:none;border-radius:50px;padding:16px 48px;font-family:'Fredoka One',sans-serif;font-size:1.4rem;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.2);text-decoration:none;display:inline-block;margin-bottom:16px">🏠 Home</a>
</div>
<a class="home-btn" href="index.html">🏠 Home</a>

<script>
const LEVELS = [
  { name:'Move!',       emoji:'🌟', instr:'Move the mouse over the shining star!',       skill:'move' },
  { name:'Click!',      emoji:'👆', instr:'Click on the bouncy animals!',                 skill:'click' },
  { name:'Double Click!',emoji:'👆👆',instr:'Double-click to open the present!',           skill:'dblclick' },
  { name:'Drag!',       emoji:'✊',  instr:"Hold click and drag 🌸 to the circle!",       skill:'drag' },
  { name:'Drag & Drop!',emoji:'🎮', instr:'Drop each fruit into the right basket!',      skill:'dropdrop' },
  { name:'You Win! 🌟', emoji:'🏆', instr:'You did it all!',                              skill:'win' },
];
const CLICK_TARGETS = [
  {emoji:'🐶',bg:'#FFB6C1'},{emoji:'🐱',bg:'#B5EAD7'},{emoji:'🐸',bg:'#C7CEEA'},
  {emoji:'🦊',bg:'#FFDAC1'},{emoji:'🐼',bg:'#E2F0CB'},{emoji:'🦁',bg:'#FFE4B5'},
];
const FRUITS = ['🍎','🍌','🍇','🍊'];
const BASKETS = [{emoji:'🍎🍌',label:'Red & Yellow'},{emoji:'🍇🍊',label:'Purple & Orange'}];

let score = 0, curLvl = 0, highestUnlocked = 0;
let dragging = false, dragEl = null, dragOffX = 0, dragOffY = 0;
let dropdropState = [], fruitsPlaced = 0;
let moveTarget = null, moveDist = 80;
let clicksNeeded = 0, clicksDone = 0;
const EMOJIS = ['✨','🌟','💫','⭐','🎉','🎊','🌈','🍭'];

const cursor = document.getElementById('cursor');
const scoreEl = document.getElementById('score');
const banner = document.getElementById('banner');
const ltName = document.getElementById('lt-name');
const ltInstr = document.getElementById('lt-instr');
const levelTitle = document.getElementById('level-title');
const lvlup = document.getElementById('lvlup');
const luTitle = document.getElementById('lu-title');
const luDesc = document.getElementById('lu-desc');
const luBtn = document.getElementById('lu-btn');
const winEl = document.getElementById('win');

// Mouse tracking
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
  if (dragging && dragEl) {
    dragEl.style.left = (e.clientX - dragOffX) + 'px';
    dragEl.style.top  = (e.clientY - dragOffY) + 'px';
    checkDragZone(e.clientX, e.clientY);
    checkDropZone(e.clientX, e.clientY);
  }
  if (LEVELS[curLvl]?.skill === 'move' && moveTarget) checkMoveTarget(e.clientX, e.clientY);
});
document.addEventListener('mousedown', () => cursor.classList.add('clicking'));
document.addEventListener('mouseup', e => {
  cursor.classList.remove('clicking');
  if (dragging) dropItem(e.clientX, e.clientY);
});

function addScore(n) {
  score += n;
  scoreEl.textContent = score;
  scoreEl.parentElement.animate([{transform:'scale(1.3)',color:'#FF85A1'},{transform:'scale(1)'}],{duration:300});
}

function spawnSparkles(x, y) {
  for (let i = 0; i < 6; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
    s.style.left = (x + (Math.random()-.5)*80) + 'px';
    s.style.top  = (y + (Math.random()-.5)*80) + 'px';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 1000);
  }
}

function confetti() {
  const colors = ['#FF85A1','#FFD700','#C77DFF','#7BC67E','#87CEEB','#FFA552'];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random()*100+'vw';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.borderRadius = Math.random()>.5?'50%':'2px';
    p.style.animationDuration = (1.5+Math.random()*2)+'s';
    p.style.animationDelay = Math.random()*0.5+'s';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 3500);
  }
}

function clearGame() {
  document.querySelectorAll('.move-target,.click-target,.dbl-box,.drag-source,.drag-zone,.basket,.drop-fruit').forEach(e=>e.remove());
  dragging = false; dragEl = null; fruitsPlaced = 0; dropdropState = [];
}

function showLvlUp(nextIdx) {
  if (nextIdx > highestUnlocked) highestUnlocked = nextIdx;
  const lvl = LEVELS[nextIdx];
  luTitle.textContent = nextIdx === LEVELS.length-1 ? '🏆 You Did It!' : '🌟 Level Up!';
  luDesc.textContent = lvl.emoji + ' ' + lvl.name;
  lvlup.classList.add('show');
  luBtn.onclick = () => { lvlup.classList.remove('show'); startLevel(nextIdx); };
}

function startLevel(idx) {
  curLvl = idx;
  clearGame();
  levelTitle.style.display = 'none';
  banner.style.display = 'none';
  const lvl = LEVELS[idx];
  if (lvl.skill === 'win') { confetti(); winEl.classList.add('show'); return; }
  banner.textContent = lvl.instr;
  banner.style.display = 'block';
  ({move,click,dblclick,drag,dropdrop})[lvl.skill]?.();
}

// ── Level 1: Move ──────────────────────────────────────────────────────────
function move() {
  spawnMoveTarget();
}
function spawnMoveTarget() {
  const el = document.createElement('div');
  el.className = 'move-target';
  const size = 90;
  const x = Math.random()*(window.innerWidth-size-80)+40;
  const y = Math.random()*(window.innerHeight-size-160)+80;
  el.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px`;
  el.textContent = '⭐';
  document.body.appendChild(el);
  moveTarget = {el, cx:x+size/2, cy:y+size/2};
}
function checkMoveTarget(mx, my) {
  if (!moveTarget) return;
  const dx = mx - moveTarget.cx, dy = my - moveTarget.cy;
  if (Math.sqrt(dx*dx+dy*dy) < moveDist) {
    spawnSparkles(moveTarget.cx, moveTarget.cy);
    moveTarget.el.remove();
    moveTarget = null;
    addScore(10);
    // After collecting 5, advance
    if (score >= 50) { setTimeout(()=>showLvlUp(curLvl+1), 400); return; }
    setTimeout(spawnMoveTarget, 300);
  }
}

// ── Level 2: Click ─────────────────────────────────────────────────────────
function click() {
  clicksNeeded = 6; clicksDone = 0;
  CLICK_TARGETS.forEach(t => spawnClickTarget(t));
}
function spawnClickTarget({emoji,bg}) {
  const el = document.createElement('div');
  el.className = 'click-target';
  const size = 90;
  const x = Math.random()*(window.innerWidth-size-40)+20;
  const y = Math.random()*(window.innerHeight-size-160)+80;
  el.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${bg}`;
  el.textContent = emoji;
  el.addEventListener('click', () => {
    spawnSparkles(x+size/2, y+size/2);
    el.remove(); addScore(10); clicksDone++;
    if (clicksDone >= clicksNeeded) setTimeout(()=>showLvlUp(curLvl+1), 400);
    else {
      // Respawn after a beat
      setTimeout(()=>spawnClickTarget({emoji,bg}), 600);
    }
  });
  document.body.appendChild(el);
}

// ── Level 3: Double Click ──────────────────────────────────────────────────
function dblclick() {
  const el = document.createElement('div');
  el.className = 'dbl-box';
  const size = 140;
  const x = window.innerWidth/2 - size/2;
  const y = window.innerHeight/2 - size/2 - 20;
  el.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:linear-gradient(135deg,#FFD700,#FFA552)`;
  el.textContent = '🎁';
  let clicks = 0;
  el.addEventListener('click', () => {
    clicks++;
    el.style.transform = `scale(${1+clicks*.05})`;
    if (clicks >= 2) {
      el.textContent = '🎉';
      spawnSparkles(x+size/2, y+size/2);
      confetti(); addScore(30);
      setTimeout(()=>showLvlUp(curLvl+1), 700);
    }
  });
  document.body.appendChild(el);
  banner.textContent = 'Double-click to open the present! 🎁';
}

// ── Level 4: Drag ──────────────────────────────────────────────────────────
function drag() {
  // Source flower
  const src = document.createElement('div');
  src.className = 'drag-source';
  const sz = 90;
  src.style.cssText = `left:80px;top:${window.innerHeight/2-sz/2}px;width:${sz}px;height:${sz}px;background:linear-gradient(135deg,#FF85A1,#C77DFF)`;
  src.textContent = '🌸';
  // Zone
  const zone = document.createElement('div');
  zone.className = 'drag-zone';
  const zoneSize = 120;
  zone.style.cssText = `right:80px;top:${window.innerHeight/2-zoneSize/2}px;width:${zoneSize}px;height:${zoneSize}px`;
  zone.textContent = '⬇️ Here!';
  zone.id = 'drag-zone';
  document.body.appendChild(src);
  document.body.appendChild(zone);
  src.addEventListener('mousedown', e => {
    dragging = true; dragEl = src;
    const r = src.getBoundingClientRect();
    dragOffX = e.clientX - r.left;
    dragOffY = e.clientY - r.top;
    src.style.animation = 'none';
    src.style.zIndex = 500;
    e.preventDefault();
  });
}
function checkDragZone(mx, my) {
  const zone = document.getElementById('drag-zone');
  if (!zone) return;
  const r = zone.getBoundingClientRect();
  const inside = mx>r.left && mx<r.right && my>r.top && my<r.bottom;
  zone.classList.toggle('lit', inside);
}
function dropItem(mx, my) {
  if (!dragging || !dragEl) return;

  if (LEVELS[curLvl]?.skill === 'dropdrop') {
    const baskets = document.querySelectorAll('.basket');
    baskets.forEach((b, i) => {
      const r = b.getBoundingClientRect();
      if (mx>r.left && mx<r.right && my>r.top && my<r.bottom) {
        const expected = parseInt(dragEl.dataset.basket);
        if (i === expected) {
          dragEl.dataset.placed = '1';
          dragEl.style.left = (r.left + r.width/2 - 40) + 'px';
          dragEl.style.top  = (r.top  + 20) + 'px';
          dragEl.style.zIndex = 60;
          spawnSparkles(mx, my); addScore(15);
          fruitsPlaced++;
          b.classList.remove('lit');
          if (fruitsPlaced >= 4) { confetti(); setTimeout(()=>showLvlUp(curLvl+1), 500); }
        } else {
          b.classList.remove('lit');
        }
      }
    });
  } else {
    const zone = document.getElementById('drag-zone');
    if (zone) {
      const r = zone.getBoundingClientRect();
      if (mx>r.left && mx<r.right && my>r.top && my<r.bottom) {
        spawnSparkles(mx, my); confetti(); addScore(30);
        setTimeout(()=>showLvlUp(curLvl+1), 500);
      }
    }
  }

  dragging = false; dragEl = null;
}

// ── Level 5: Drop ──────────────────────────────────────────────────────────
function dropdrop() {
  // Two baskets
  const bw = 160, bh = 180;
  const b1 = document.createElement('div'); b1.className = 'basket'; b1.id='b0';
  b1.style.cssText = `left:10%;bottom:60px;width:${bw}px;height:${bh}px;background:linear-gradient(135deg,rgba(255,107,107,.3),rgba(255,167,82,.3))`;
  b1.innerHTML = `<span style="font-size:2rem">🍎🍌</span><span class="basket-label">Red & Yellow</span>`;
  const b2 = document.createElement('div'); b2.className = 'basket'; b2.id='b1';
  b2.style.cssText = `right:10%;bottom:60px;width:${bw}px;height:${bh}px;background:linear-gradient(135deg,rgba(138,43,226,.3),rgba(255,140,0,.3))`;
  b2.innerHTML = `<span style="font-size:2rem">🍇🍊</span><span class="basket-label">Purple & Orange</span>`;
  document.body.appendChild(b1); document.body.appendChild(b2);

  const items = [
    {emoji:'🍎',basket:0},{emoji:'🍌',basket:0},{emoji:'🍇',basket:1},{emoji:'🍊',basket:1}
  ];
  items.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'drag-source drop-fruit';
    el.dataset.basket = item.basket;
    el.dataset.placed = '0';
    const sz = 80;
    el.style.cssText = `left:${25+i*16}%;top:${20+Math.random()*25}%;width:${sz}px;height:${sz}px;background:rgba(255,255,255,.7);z-index:50`;
    el.textContent = item.emoji;
    el.addEventListener('mousedown', e => {
      if (el.dataset.placed === '1') return;
      dragging = true; dragEl = el;
      const r = el.getBoundingClientRect();
      dragOffX = e.clientX - r.left;
      dragOffY = e.clientY - r.top;
      el.style.animation = 'none'; el.style.zIndex = 500;
      e.preventDefault();
    });
    document.body.appendChild(el);
    dropdropState.push({el, basket:item.basket});
  });
}
function checkDropZone(mx, my) {
  document.querySelectorAll('.basket').forEach((b,i)=>{
    const r = b.getBoundingClientRect();
    const inside = mx>r.left && mx<r.right && my>r.top && my<r.bottom;
    b.classList.toggle('lit', inside);
  });
}
document.addEventListener('mouseup', e => {
  dropItem(e.clientX, e.clientY);
}, true);

// Start game
startLevel(0);
</script>
