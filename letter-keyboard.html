<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letter Keyboard! ⌨️</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fff9f0; --yellow: #FFD600; --orange: #FF7A00;
  --pink: #FF4D8F; --teal: #00C2B2; --purple: #7C3AED;
  --correct: #22c55e; --wrong: #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  overflow-x: hidden; position: relative;
}
/* Floating stars */
.stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.star {
  position: absolute; font-size: 1.4rem;
  animation: floatUp linear infinite; opacity: .15;
}
@keyframes floatUp {
  0%   { transform: translateY(110vh) rotate(0); opacity: 0; }
  10%  { opacity: .18; }
  90%  { opacity: .18; }
  100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
}
.game-wrap {
  position: relative; z-index: 1; width: 100%;
  max-width: 900px; padding: 24px 16px 40px;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
}
/* Header row */
.header {
  width: 100%; display: flex; justify-content: space-between;
  align-items: center; flex-wrap: wrap; gap: 12px;
}
.logo { font-family:'Fredoka One',sans-serif; font-size:1.6rem; color:var(--purple); }
.stats { display:flex; gap:10px; }
.stat-pill {
  background: white; border-radius: 50px;
  padding: 8px 18px; font-family:'Fredoka One',sans-serif;
  font-size: 1rem; color: #333;
  box-shadow: 0 3px 12px rgba(0,0,0,.08);
}
.stat-pill span { color: var(--pink); }
/* Timer toggle */
#timer-toggle {
  background: #f0f0f0; border: none; border-radius: 50px;
  padding: 8px 18px; font-family:'Fredoka One',sans-serif;
  font-size: 1rem; cursor: pointer; transition: all .2s; color: #666;
}
#timer-toggle.on { background: var(--orange); color: white; }
/* Letter display */
.letter-zone {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
}
#big-letter {
  font-family: 'Fredoka One', sans-serif;
  font-size: clamp(5rem, 18vw, 10rem);
  color: var(--purple);
  text-shadow: 0 4px 0 rgba(124,58,237,.25);
  animation: letterIn .4s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes letterIn {
  from { transform: scale(.3) rotate(-15deg); opacity: 0; }
  to   { transform: scale(1)  rotate(0);      opacity: 1; }
}
#big-letter.flash-correct { animation: flashGreen .4s forwards; }
#big-letter.flash-wrong   { animation: flashRed   .4s forwards; }
@keyframes flashGreen {
  0%,100% { color: var(--correct); transform: scale(1.2); }
  50%     { color: var(--correct); transform: scale(1.3); }
}
@keyframes flashRed {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-10px); }
  40%     { transform: translateX(10px); }
  60%     { transform: translateX(-8px); }
  80%     { transform: translateX(8px); }
}
#say-again {
  background: white; border: 2.5px solid var(--purple);
  border-radius: 50px; padding: 10px 28px;
  font-family: 'Fredoka One', sans-serif; font-size: 1.2rem;
  color: var(--purple); cursor: pointer; transition: all .15s;
  box-shadow: 0 4px 12px rgba(124,58,237,.15);
}
#say-again:hover { background: var(--purple); color: white; transform: scale(1.05); }
/* Timer ring */
#timer-wrap { position: relative; width: 64px; height: 64px; }
#timer-svg { transform: rotate(-90deg); }
#timer-track { fill: none; stroke: #eee; stroke-width: 6; }
#timer-fill  { fill: none; stroke: var(--teal); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset .1s linear; }
#timer-num {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-family: 'Fredoka One', sans-serif; font-size: 1.4rem; color: #333;
}
/* Feedback */
#feedback-msg {
  font-family: 'Fredoka One', sans-serif; font-size: clamp(1.2rem, 4vw, 2rem);
  text-align: center; min-height: 2.5rem; transition: all .2s;
}
/* Keyboard */
.keyboard {
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; width: 100%;
}
.kb-row { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
.key {
  min-width: clamp(36px, 7vw, 54px); height: clamp(50px, 9vw, 68px);
  background: white; border: 2px solid #e2ddd5;
  border-bottom: 4px solid #ccc;
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-family: 'Fredoka One', sans-serif;
  font-size: clamp(1rem, 3vw, 1.5rem);
  color: #333; cursor: pointer; transition: all .1s;
  box-shadow: 0 2px 6px rgba(0,0,0,.06);
  user-select: none;
}
.key:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,.1); }
.key:active { transform: translateY(2px); border-bottom-width: 2px; }
.key.flash-correct {
  background: var(--correct); color: white; border-color: var(--correct);
  animation: keyPop .4s forwards;
}
.key.flash-wrong {
  background: var(--wrong); color: white; border-color: var(--wrong);
}
@keyframes keyPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.25); }
  70%  { transform: scale(.95); }
  100% { transform: scale(1); }
}
/* Confetti */
.confetti-piece {
  position: fixed; width: 12px; height: 12px;
  pointer-events: none; z-index: 9999; top: 0;
  animation: cfall ease-in forwards;
}
@keyframes cfall {
  0%   { transform: translateY(-20px) rotate(0); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
/* Home */
.home-btn {
  position: fixed; bottom: 20px; left: 20px; z-index: 1000;
  background: rgba(255,255,255,.85); backdrop-filter: blur(8px);
  border: 2px solid rgba(0,0,0,.1); border-radius: 50px;
  padding: 10px 22px; font-family: 'Nunito', sans-serif;
  font-size: 1rem; font-weight: 800; color: #2D1B69;
  cursor: pointer; text-decoration: none;
  box-shadow: 0 4px 16px rgba(0,0,0,.15); transition: all .2s;
}
.home-btn:hover { transform: scale(1.05); background: white; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="game-wrap">
  <div class="header">
    <div class="logo">⌨️ Letter Keyboard</div>
    <div class="stats">
      <div class="stat-pill">⭐ <span id="score">0</span></div>
      <div class="stat-pill">🔥 <span id="streak">0</span></div>
    </div>
    <button id="timer-toggle" onclick="toggleTimer()">⏱ Timer: Off</button>
  </div>

  <div class="letter-zone">
    <div id="big-letter">A</div>
    <div style="display:flex;gap:16px;align-items:center">
      <button id="say-again" onclick="sayLetter()">🔊 Say it again!</button>
      <div id="timer-wrap" style="display:none">
        <svg id="timer-svg" width="64" height="64" viewBox="0 0 64 64">
          <circle id="timer-track" cx="32" cy="32" r="28"/>
          <circle id="timer-fill"  cx="32" cy="32" r="28" stroke-dasharray="175.9" stroke-dashoffset="0"/>
        </svg>
        <div id="timer-num">5</div>
      </div>
    </div>
  </div>

  <div id="feedback-msg"></div>

  <div class="keyboard">
    <div class="kb-row" id="row1"></div>
    <div class="kb-row" id="row2"></div>
    <div class="kb-row" id="row3"></div>
  </div>
</div>

<a class="home-btn" href="index.html">🏠 Home</a>

<script>
const ROWS = [
  'QWERTYUIOP'.split(''),
  'ASDFGHJKL'.split(''),
  'ZXCVBNM'.split(''),
];
const KEY_COLORS = [
  '#FF6B6B','#FF9F43','#FECA57','#48DBFB',
  '#FF9FF3','#54A0FF','#1DD1A1','#C77DFF','#FF85A1',
];

let score=0, streak=0, gameActive=true;
let answered=false, target='';
let timerOn=false, timerInterval=null, timerLeft=5;
const CIRCUMFERENCE = 175.9;

const scoreEl   = document.getElementById('score');
const streakEl  = document.getElementById('streak');
const bigLetter = document.getElementById('big-letter');
const feedbackEl= document.getElementById('feedback-msg');
const timerWrap = document.getElementById('timer-wrap');
const timerFill = document.getElementById('timer-fill');
const timerNum  = document.getElementById('timer-num');

// Build keyboard
const allLetters = [];
ROWS.forEach((row, ri) => {
  const rowEl = document.getElementById(`row${ri+1}`);
  row.forEach((letter, li) => {
    const key = document.createElement('div');
    key.className = 'key';
    key.textContent = letter;
    key.id = 'key-' + letter;
    key.style.background = KEY_COLORS[(ri*9+li)%KEY_COLORS.length];
    key.style.color = 'white';
    key.style.borderColor = 'transparent';
    key.addEventListener('click', () => onKey(letter));
    rowEl.appendChild(key);
    allLetters.push(letter);
  });
});

// Physical keyboard
document.addEventListener('keydown', e => {
  const k = e.key.toUpperCase();
  if (allLetters.includes(k)) onKey(k);
});

function onKey(letter) {
  if (!gameActive || answered) return;
  const keyEl = document.getElementById('key-' + letter);
  if (letter === target) {
    answered = true;
    clearCountdown();
    keyEl.classList.add('flash-correct');
    streak++; score += 10 + streak * 2;
    scoreEl.textContent = score; streakEl.textContent = streak;
    bigLetter.classList.remove('flash-wrong');
    bigLetter.classList.add('flash-correct');
    showFeedback(['Amazing! 🌟','Brilliant! 🎉','Wow! 💫','Yes! ⭐','Perfect! 🎊']);
    if (score % 60 === 0) spawnConfetti();
    setTimeout(() => {
      keyEl.classList.remove('flash-correct');
      bigLetter.classList.remove('flash-correct');
      newRound();
    }, 700);
  } else {
    streak = 0; streakEl.textContent = 0;
    keyEl.classList.add('flash-wrong');
    bigLetter.classList.add('flash-wrong');
    showFeedback(['Try again! 😊','Not that one! 🙈','Keep going! 👀']);
    setTimeout(() => {
      keyEl.classList.remove('flash-wrong');
      bigLetter.classList.remove('flash-wrong');
      answered = false;
      if (timerOn) startCountdown();
    }, 600);
  }
}

function newRound() {
  answered = false;
  target = allLetters[Math.floor(Math.random()*allLetters.length)];
  bigLetter.textContent = target;
  bigLetter.style.animation = 'none';
  void bigLetter.offsetWidth;
  bigLetter.style.animation = '';
  feedbackEl.textContent = '';
  setTimeout(() => { sayLetter(); if (timerOn) startCountdown(); }, 300);
}

function sayLetter() {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(`Find the letter ${target}`);
  u.rate = .85; u.pitch = 1.3;
  speechSynthesis.cancel();
  const voices = speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));
  if (voices.length) u.voice = voices.find(v=>/female/i.test(v.name)) || voices[0];
  speechSynthesis.speak(u);
}

function showFeedback(msgs) {
  feedbackEl.textContent = msgs[Math.floor(Math.random()*msgs.length)];
  feedbackEl.style.color = msgs === ['Amazing! 🌟','Brilliant! 🎉','Wow! 💫','Yes! ⭐','Perfect! 🎊'] ? '#22c55e' : '#ef4444';
}

// Timer
function toggleTimer() {
  timerOn = !timerOn;
  const btn = document.getElementById('timer-toggle');
  btn.textContent = timerOn ? '⏱ Timer: On' : '⏱ Timer: Off';
  btn.classList.toggle('on', timerOn);
  timerWrap.style.display = timerOn ? 'block' : 'none';
  if (!timerOn) clearCountdown();
}

function startCountdown() {
  clearCountdown();
  timerLeft = 5;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerLeft -= .1;
    updateTimerDisplay();
    if (timerLeft <= 0) {
      clearCountdown();
      // Time's up
      const u = new SpeechSynthesisUtterance(`Time's up! The letter was ${target}`);
      u.rate=.85; u.pitch=1.2;
      speechSynthesis.cancel(); speechSynthesis.speak(u);
      bigLetter.style.color = '#ef4444';
      feedbackEl.textContent = `⏰ Too slow! That was ${target}!`;
      feedbackEl.style.color = '#ef4444';
      answered = true;
      setTimeout(() => { bigLetter.style.color = ''; newRound(); }, 1500);
    }
  }, 100);
}

function clearCountdown() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  timerLeft = 5; updateTimerDisplay();
}

function updateTimerDisplay() {
  const pct = Math.max(0, timerLeft / 5);
  timerFill.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
  timerFill.style.stroke = timerLeft <= 2 ? '#ef4444' : '#00C2B2';
  timerNum.textContent = Math.ceil(timerLeft);
}

function spawnConfetti() {
  const colors = ['#FF85A1','#FFD700','#C77DFF','#7BC67E','#87CEEB'];
  for (let i=0;i<50;i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random()*100+'vw';
    p.style.background = colors[~~(Math.random()*colors.length)];
    p.style.borderRadius = Math.random()>.5?'50%':'2px';
    p.style.animationDuration = (1.5+Math.random()*2)+'s';
    p.style.animationDelay = Math.random()*.5+'s';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),3500);
  }
}

// Floating stars
const starsEl = document.getElementById('stars');
'✨🌟💫⭐🌈🍭🎉🎊'.split('').forEach(emoji => {
  const s = document.createElement('div');
  s.className = 'star'; s.textContent = emoji;
  s.style.cssText = `left:${Math.random()*100}%;animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*8}s`;
  starsEl.appendChild(s);
});

if ('speechSynthesis' in window) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

newRound();
</script>
</body>
</html>
