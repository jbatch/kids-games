name: publish
on:
  push:
    branches:
      - master
jobs:
  publish-kids-games-docker-image:
    name: Publish Kids Games Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Build static files
        run: pnpm build
      - name: Build the Kids Games Docker image
        run: |
          docker build . --tag ghcr.io/jbatch/kids-games:latest
          docker push ghcr.io/jbatch/kids-games:latest
